---
name: CI/CD

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Working branch"
        type: string
        required: false
        default: ""
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read

jobs:
  auto-lock:
    runs-on: ubuntu-latest
    name: Pin Docker Images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: crazyrokr/gha-workflows/ha-addon-auto-locker@master
        with:
          branch: ${{ github.event.inputs.branch }}
          lookup_sources: Dockerfile
  run-builder:
    needs: auto-lock
    uses: crazyrokr/gha-workflows/.github/workflows/ha-addon-cicd.yaml@master
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      packages: write
